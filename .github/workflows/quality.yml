name: Quality

on:
  push:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x

    - name: Setup pnpm
      uses: pnpm/action-setup@v4

    - name: Get pnpm store directory
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

    - name: Setup pnpm cache
      uses: actions/cache@v4
      with:
        path: ${{ env.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: CI: Print revision and requests.service.ts snippet
      run: |
        echo "CI_COMMIT=$(git rev-parse --short HEAD)"
        echo "CI_REF=$(git rev-parse HEAD)"
        echo "----- apps/api/src/requests/requests.service.ts (first 220 lines) -----"
        sed -n '1,220p' apps/api/src/requests/requests.service.ts || true

    - name: Run lint
      run: pnpm lint

    - name: Run tests
      run: pnpm test

    - name: Build
      run: pnpm build 